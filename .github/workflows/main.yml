name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # requirements.txt, could make pyproject.toml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install requirements for ALL services
        find src -name "requirements.txt" -exec pip install -r {} \;
        # Install testing libraries
        pip install netifaces scapy pytest
        pip install pytest pytest-cov requests flake8
        pip install poetry
        cd src/cnss
        poetry config virtualenvs.create false
        poetry install --no-root --no-interaction
    
    - name: Lint with flake8 (syntax check)
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Tests with Pytest
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: testuser
        DB_PASSWORD: testpass
        DB_NAME: testdb
      run: |
        set +e  # temporarily disable exit on error
        pytest src/ --cov=src/ --cov-report=xml --cov-report=html --maxfail=1 --disable-warnings -v
        EXIT_CODE=$?
        set -e  # re-enable exit on error
        if [ $EXIT_CODE -eq 5 ]; then
          echo "No unit tests found"
          exit 0
        elif [ $EXIT_CODE -eq 0 ]; then
          echo "All tests passed"
          exit 0
        else
          echo "Tests failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi
        
    - name: Build Docker images
      run: |
        cd src
        docker compose build
      
    # Containers start and stay healthy
    - name: Smoke Test
      run: |
        cd src
        docker compose up -d
        echo "Waiting 15 seconds for services to initialize"
        sleep 15
        
        # Check that all expected containers are running
        docker ps --filter "status=running" --format "table {{.Names}}" | grep -E "tproc|cnss|cn|postgres"
        
        # curl --fail http://localhost:8000/health || exit 1 (for /health)
        
        echo "All containers are running"
        docker compose down

