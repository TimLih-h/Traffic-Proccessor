version: "2.4"

services:

  # --------------------------------------------------------
  # 1. TProc - Packet capture
  # --------------------------------------------------------
  tproc:
    build:
      context: ./Traffic_Processor
    container_name: tproc
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TARGET_HOSTNAME=iperf3-server
      - PYTHONUNBUFFERED=1
    command: >
      python tproc.py -i eth0 --url http://cnss:8080/load
    depends_on:
      - cnss
      - iperf3-server
    network_mode: "service:iperf3-server"
    restart: unless-stopped

  # --------------------------------------------------------
  # 2. CNSS — Control & Status Server
  # --------------------------------------------------------
  cnss:
    build:
      context: ./cnss
      dockerfile: Dockerfile
    container_name: cnss
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      - DB_NAME=postgresdb
      - DB_USER=postgres_user
      - DB_PASSWORD=password123
      - DB_HOST=postgres          # Now resolved by the new 'postgres' service
      - DB_PORT=5432
      - DEV_MODE=true
    command: >
      sh -c "poetry run alembic upgrade head &&
             poetry run uvicorn app.main:app --host 0.0.0.0 --port 8080"
    depends_on:
      postgres:
        condition: service_healthy   # Wait for DB to be ready
    networks:
      - swp-net
    restart: unless-stopped

  # --------------------------------------------------------
  # 3. PostgreSQL for CNSS (new)
  # --------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: postgresdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgresdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swp-net
    restart: unless-stopped

  # ---------- 4. iperf3 – Traffic Generator (Server Mode) ----------
  iperf3-server:
    image: networkstatic/iperf3:latest
    container_name: iperf3-server
    command: -s -p 5201
    ports:
      - "5201:5201"   # Expose iperf3 port to host (optional)
    networks:
      - swp-net
    restart: unless-stopped

  # ---------- 5. iperf3 – Traffic Generator (Client Mode) ----------
  iperf3-client:
    image: networkstatic/iperf3:latest
    container_name: iperf3-client
    command: -c iperf3-server -p 5201 -u -b 20M -i 1 -t 60
    depends_on:
      - iperf3-server
    networks:
      - swp-net
    restart: "no"   # Run once and exit

  

volumes:   
  postgres-data: 
networks:
  swp-net: {}