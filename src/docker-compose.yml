services:  
  # --------------------------------------------------------
  # CNSS — Control & Status Server
  # --------------------------------------------------------
  cnss:
    build:
      context: ./cnss
      dockerfile: Dockerfile
    container_name: cnss
    ports:
      - "38080:38080"
    expose:
      - "38080"
    environment:
      - DB_NAME=postgresdb
      - DB_USER=postgres_user
      - DB_PASSWORD=password123
      - DB_HOST=postgres
      - DB_PORT=5432
      - DEV_MODE=true
    command: >
      sh -c "poetry run alembic upgrade head &&
             poetry run uvicorn app.main:app --host 0.0.0.0 --port 38080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swp-net
    restart: unless-stopped

  # --------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------
  postgres:
    image: postgres:14.8-alpine3.18
    container_name: postgres_swp
    environment:
      POSTGRES_DB: "postgresdb"
      POSTGRES_USER: "postgres_user"
      POSTGRES_PASSWORD: "password123"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgresdb"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - swp-net
    restart: unless-stopped



networks:
  swp-net:
    driver: bridge
    name: swp-net

volumes:
  shared_data:
    driver: local
  postgres_data:
    driver: local